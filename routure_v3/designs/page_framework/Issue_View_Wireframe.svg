<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="4200" viewBox="0 0 1440 4200">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .serif { font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif; }
    </style>
    <!-- Varied gradients for distinct image placeholders -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c2c2c"/><stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3d3d"/><stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4a4a"/><stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="g4" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#383838"/><stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#555"/><stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/><stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="g7" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#444"/><stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="g8" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#505050"/><stop offset="100%" stop-color="#2e2e2e"/>
    </linearGradient>
    <!-- Clickable hover hint -->
    <filter id="hoverShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="4200" fill="#F5F4F2"/>

  <!-- ===== NAVBAR ===== -->
  <rect x="0" y="0" width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="80" x2="1440" y2="80" stroke="#E0E0E0" stroke-width="1"/>
  <text x="80" y="50" class="serif" font-size="26" font-weight="700" fill="#111">THE REVIEW</text>
  <text x="750" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">ISSUES</text>
  <text x="870" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">SHOOTS</text>
  <text x="990" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">ARTICLES</text>
  <text x="1120" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">ABOUT</text>
  <circle cx="1320" cy="42" r="10" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="1327" y1="49" x2="1335" y2="57" stroke="#555" stroke-width="1.5"/>

  <!-- ===== ISSUE HEADER ===== -->
  <text x="720" y="135" class="serif" font-size="11" fill="#AAA" text-anchor="middle" letter-spacing="4">ISSUE NO. 24</text>
  <text x="720" y="185" class="serif" font-size="48" font-weight="700" fill="#1a1a1a" text-anchor="middle">Spring 2026</text>
  <line x1="690" y1="205" x2="750" y2="205" stroke="#1a1a1a" stroke-width="1"/>
  <text x="720" y="235" font-size="12" fill="#999" text-anchor="middle" letter-spacing="1">16 photographs · 4 articles · scroll to explore</text>

  <!-- ===== CURSOR HINT ===== -->
  <text x="1360" y="240" font-size="9" fill="#CCC" text-anchor="end" letter-spacing="1.5">CLICK ANY IMAGE TO VIEW</text>

  <!-- ============================================================ -->
  <!-- ===== MOSAIC ROW 1 — Full width hero image ===== -->
  <!-- ============================================================ -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="280" width="1280" height="560" rx="3" fill="url(#g1)"/>
    <!-- Clickable indicator -->
    <rect x="80" y="280" width="1280" height="560" rx="3" fill="none" stroke="#FFF" stroke-width="0" opacity="0"/>
    <text x="720" y="545" class="serif" font-size="28" fill="#FFF" text-anchor="middle" opacity="0.8">Cover Spread</text>
    <text x="720" y="580" font-size="11" fill="#999" text-anchor="middle" letter-spacing="2">01</text>
    <!-- Cursor icon hint -->
    <circle cx="1310" cy="320" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="325" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <!-- ============================================================ -->
  <!-- ===== MOSAIC ROW 2 — Two columns: tall left + two stacked right ===== -->
  <!-- ============================================================ -->
  <!-- LEFT: Tall portrait (WITH ARTICLE) -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="860" width="540" height="720" rx="3" fill="url(#g2)"/>
    <text x="350" y="1150" class="serif" font-size="22" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="350" y="1185" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">02</text>
    <circle cx="570" cy="900" r="14" fill="#FFF" opacity="0.15"/>
    <text x="570" y="905" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
    <!-- ARTICLE TITLE — attached to image -->
    <rect x="80" y="1420" width="540" height="80" rx="0" fill="#111" opacity="0.88"/>
    <text x="110" y="1452" class="serif" font-size="11" fill="#999" letter-spacing="2">FEATURE</text>
    <text x="110" y="1480" class="serif" font-size="18" font-weight="700" fill="#FFF">The Architecture of Light</text>
    <text x="520" y="1475" font-size="10" fill="#777" text-anchor="end">→ Read</text>
  </g>

  <!-- RIGHT TOP: Landscape -->
  <g filter="url(#hoverShadow)">
    <rect x="640" y="860" width="720" height="340" rx="3" fill="url(#g3)"/>
    <text x="1000" y="1035" class="serif" font-size="22" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="1000" y="1070" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">03</text>
    <circle cx="1310" cy="900" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="905" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <!-- RIGHT BOTTOM: Landscape (WITH ARTICLE) -->
  <g filter="url(#hoverShadow)">
    <rect x="640" y="1220" width="720" height="360" rx="3" fill="url(#g4)"/>
    <text x="1000" y="1370" class="serif" font-size="22" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="1000" y="1405" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">04</text>
    <circle cx="1310" cy="1260" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="1265" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
    <!-- ARTICLE TITLE -->
    <rect x="640" y="1500" width="720" height="80" rx="0" fill="#111" opacity="0.88"/>
    <text x="670" y="1532" class="serif" font-size="11" fill="#999" letter-spacing="2">INTERVIEW</text>
    <text x="670" y="1560" class="serif" font-size="18" font-weight="700" fill="#FFF">Conversations in Colour</text>
    <text x="1310" y="1555" font-size="10" fill="#777" text-anchor="end">→ Read</text>
  </g>

  <!-- ============================================================ -->
  <!-- ===== MOSAIC ROW 3 — Three equal columns ===== -->
  <!-- ============================================================ -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="1620" width="400" height="480" rx="3" fill="url(#g5)"/>
    <text x="280" y="1860" class="serif" font-size="20" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="280" y="1895" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">05</text>
    <circle cx="430" cy="1660" r="14" fill="#FFF" opacity="0.15"/>
    <text x="430" y="1665" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <g filter="url(#hoverShadow)">
    <rect x="500" y="1620" width="440" height="480" rx="3" fill="url(#g6)"/>
    <text x="720" y="1860" class="serif" font-size="20" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="720" y="1895" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">06</text>
    <circle cx="890" cy="1660" r="14" fill="#FFF" opacity="0.15"/>
    <text x="890" y="1665" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <g filter="url(#hoverShadow)">
    <rect x="960" y="1620" width="400" height="480" rx="3" fill="url(#g7)"/>
    <text x="1160" y="1860" class="serif" font-size="20" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="1160" y="1895" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">07</text>
    <circle cx="1310" cy="1660" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="1665" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <!-- ============================================================ -->
  <!-- ===== MOSAIC ROW 4 — Full width landscape + article ===== -->
  <!-- ============================================================ -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="2130" width="1280" height="440" rx="3" fill="url(#g8)"/>
    <text x="720" y="2340" class="serif" font-size="26" fill="#FFF" text-anchor="middle" opacity="0.7">Full Spread</text>
    <text x="720" y="2375" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">08</text>
    <circle cx="1310" cy="2170" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="2175" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
    <!-- ARTICLE TITLE -->
    <rect x="80" y="2490" width="1280" height="80" rx="0" fill="#111" opacity="0.88"/>
    <text x="110" y="2522" class="serif" font-size="11" fill="#999" letter-spacing="2">ESSAY</text>
    <text x="110" y="2550" class="serif" font-size="18" font-weight="700" fill="#FFF">On Stillness &amp; Motion — A Visual Meditation</text>
    <text x="1310" y="2545" font-size="10" fill="#777" text-anchor="end">→ Read</text>
  </g>

  <!-- ============================================================ -->
  <!-- ===== MOSAIC ROW 5 — Asymmetric: wide left + narrow tall right ===== -->
  <!-- ============================================================ -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="2610" width="820" height="400" rx="3" fill="url(#g1)"/>
    <text x="490" y="2810" class="serif" font-size="22" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="490" y="2845" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">09</text>
    <circle cx="850" cy="2650" r="14" fill="#FFF" opacity="0.15"/>
    <text x="850" y="2655" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <g filter="url(#hoverShadow)">
    <rect x="920" y="2610" width="440" height="640" rx="3" fill="url(#g3)"/>
    <text x="1140" y="2920" class="serif" font-size="22" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="1140" y="2955" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">10</text>
    <circle cx="1310" cy="2650" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="2655" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <!-- Below wide left: small square -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="3030" width="400" height="220" rx="3" fill="url(#g7)"/>
    <text x="280" y="3145" class="serif" font-size="18" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="280" y="3170" font-size="10" fill="#888" text-anchor="middle" letter-spacing="2">11</text>
    <circle cx="430" cy="3060" r="12" fill="#FFF" opacity="0.15"/>
    <text x="430" y="3065" font-size="10" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <!-- WITH ARTICLE -->
  <g filter="url(#hoverShadow)">
    <rect x="500" y="3030" width="400" height="220" rx="3" fill="url(#g5)"/>
    <text x="700" y="3145" class="serif" font-size="18" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="700" y="3170" font-size="10" fill="#888" text-anchor="middle" letter-spacing="2">12</text>
    <circle cx="850" cy="3060" r="12" fill="#FFF" opacity="0.15"/>
    <text x="850" y="3065" font-size="10" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
    <!-- ARTICLE TITLE -->
    <rect x="500" y="3190" width="400" height="60" rx="0" fill="#111" opacity="0.88"/>
    <text x="520" y="3215" class="serif" font-size="11" fill="#999" letter-spacing="1.5">PROFILE</text>
    <text x="520" y="3237" class="serif" font-size="15" font-weight="700" fill="#FFF">Quiet Revolutions</text>
    <text x="860" y="3232" font-size="9" fill="#777" text-anchor="end">→ Read</text>
  </g>

  <!-- ============================================================ -->
  <!-- ===== MOSAIC ROW 6 — Two wide panels ===== -->
  <!-- ============================================================ -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="3300" width="640" height="360" rx="3" fill="url(#g4)"/>
    <text x="400" y="3480" class="serif" font-size="20" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="400" y="3510" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">13</text>
    <circle cx="670" cy="3340" r="14" fill="#FFF" opacity="0.15"/>
    <text x="670" y="3345" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <g filter="url(#hoverShadow)">
    <rect x="740" y="3300" width="620" height="360" rx="3" fill="url(#g6)"/>
    <text x="1050" y="3480" class="serif" font-size="20" fill="#FFF" text-anchor="middle" opacity="0.7">Image</text>
    <text x="1050" y="3510" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">14</text>
    <circle cx="1310" cy="3340" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="3345" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <!-- ============================================================ -->
  <!-- ===== MOSAIC ROW 7 — Final full-width closing image ===== -->
  <!-- ============================================================ -->
  <g filter="url(#hoverShadow)">
    <rect x="80" y="3690" width="1280" height="340" rx="3" fill="url(#g2)"/>
    <text x="720" y="3860" class="serif" font-size="24" fill="#FFF" text-anchor="middle" opacity="0.7">Closing Spread</text>
    <text x="720" y="3895" font-size="11" fill="#888" text-anchor="middle" letter-spacing="2">15</text>
    <circle cx="1310" cy="3730" r="14" fill="#FFF" opacity="0.15"/>
    <text x="1310" y="3735" font-size="12" fill="#FFF" text-anchor="middle" opacity="0.6">↗</text>
  </g>

  <!-- ============================================================ -->
  <!-- ===== LEGEND / KEY ===== -->
  <!-- ============================================================ -->
  <line x1="80" y1="4080" x2="1360" y2="4080" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Key: dark bar = has article -->
  <rect x="80" y="4110" width="30" height="12" rx="1" fill="#111" opacity="0.88"/>
  <text x="120" y="4121" font-size="11" fill="#999">= Image has an attached article (clickable → Shoot with Article view)</text>

  <!-- Key: no bar = photo only -->
  <circle cx="95" cy="4150" r="8" fill="#FFF" stroke="#DDD" stroke-width="0.5"/>
  <text x="95" y="4155" font-size="8" fill="#AAA" text-anchor="middle">↗</text>
  <text x="120" y="4155" font-size="11" fill="#999">= Photo only (clickable → Shoot Concept view)</text>

  <!-- ===== PAGE LABEL ===== -->
  <text x="720" y="4195" font-size="10" fill="#CCC" text-anchor="middle" letter-spacing="2">ISSUE VIEW — MOSAIC READING EXPERIENCE</text>
</svg>
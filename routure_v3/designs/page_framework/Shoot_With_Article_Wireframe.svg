<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2600" viewBox="0 0 1440 2600">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .serif { font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif; }
    </style>
    <linearGradient id="spreadHeroGrad" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="sideImgGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="sideImgGrad2" x1="0" y1="0.3" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="fullImgGrad2" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2c2c2c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="2600" fill="#FAFAF8"/>

  <!-- ===== NAVBAR ===== -->
  <rect x="0" y="0" width="1440" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="80" x2="1440" y2="80" stroke="#E0E0E0" stroke-width="1"/>
  <text x="80" y="50" class="serif" font-size="26" font-weight="700" fill="#111">THE REVIEW</text>
  <text x="750" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">ISSUES</text>
  <text x="870" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">SHOOTS</text>
  <text x="990" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">ARTICLES</text>
  <text x="1120" y="48" font-size="13" font-weight="400" fill="#555" letter-spacing="2">ABOUT</text>
  <circle cx="1320" cy="42" r="10" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="1327" y1="49" x2="1335" y2="57" stroke="#555" stroke-width="1.5"/>

  <!-- ===== FULL SPREAD IMAGE — Hero ===== -->
  <!-- "No modifications, fill to size" as noted in wireframe -->
  <rect x="0" y="80" width="1440" height="700" fill="url(#spreadHeroGrad)"/>
  <text x="720" y="400" class="serif" font-size="40" font-weight="700" fill="#FFF" text-anchor="middle" opacity="0.85">Full Spread Image</text>
  <text x="720" y="445" font-size="12" fill="#AAA" text-anchor="middle" letter-spacing="3" opacity="0.5">EDGE TO EDGE — NO MODIFICATIONS — FILL TO SIZE</text>

  <!-- ===== ARTICLE SECTION 1: Text left + Image right ===== -->
  <text x="80" y="840" class="serif" font-size="11" fill="#999" letter-spacing="3">PHOTO SHOOT + ARTICLE</text>
  <text x="80" y="885" class="serif" font-size="36" font-weight="700" fill="#1a1a1a">The Stillness Between</text>
  <text x="80" y="925" class="serif" font-size="36" font-weight="700" fill="#1a1a1a">Frames</text>
  <line x1="80" y1="950" x2="200" y2="950" stroke="#1a1a1a" stroke-width="1"/>
  <text x="80" y="980" font-size="13" fill="#777">By Alexandra Chen · Photographed by Marcus Lehmann</text>

  <!-- Article text column (left) -->
  <rect x="80" y="1020" width="600" height="480" rx="0" fill="none"/>
  <!-- Simulated text lines -->
  <line x1="80" y1="1050" x2="640" y2="1050" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1075" x2="660" y2="1075" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1100" x2="620" y2="1100" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1125" x2="650" y2="1125" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1150" x2="580" y2="1150" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1175" x2="640" y2="1175" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1200" x2="660" y2="1200" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1225" x2="610" y2="1225" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1260" x2="650" y2="1260" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1285" x2="670" y2="1285" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1310" x2="620" y2="1310" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1335" x2="660" y2="1335" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1360" x2="600" y2="1360" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1385" x2="640" y2="1385" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1410" x2="550" y2="1410" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1445" x2="660" y2="1445" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="80" y1="1470" x2="630" y2="1470" stroke="#D5D5D3" stroke-width="1.5"/>
  <text x="80" y="1042" font-size="14" fill="#555" opacity="0.9">Article text content flows here in a classic</text>
  <text x="80" y="1042" font-size="14" fill="transparent">.</text>

  <!-- Next image (right) -->
  <rect x="740" y="1020" width="620" height="480" rx="2" fill="url(#sideImgGrad)"/>
  <text x="1050" y="1270" class="serif" font-size="22" fill="#CCC" text-anchor="middle" opacity="0.7">Next Image</text>
  <rect x="740" y="1020" width="620" height="480" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>

  <!-- ===== DIVIDER ===== -->
  <line x1="80" y1="1560" x2="1360" y2="1560" stroke="#E8E8E6" stroke-width="0.5"/>

  <!-- ===== ARTICLE SECTION 2: Image left + Text right (alternating) ===== -->
  <rect x="80" y="1600" width="420" height="560" rx="2" fill="url(#sideImgGrad2)"/>
  <text x="290" y="1885" class="serif" font-size="20" fill="#CCC" text-anchor="middle" opacity="0.7">Image</text>
  <rect x="80" y="1600" width="420" height="560" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>

  <!-- Article text column (right) -->
  <rect x="560" y="1600" width="800" height="560" rx="0" fill="none"/>
  <line x1="560" y1="1640" x2="1300" y2="1640" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1665" x2="1320" y2="1665" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1690" x2="1280" y2="1690" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1715" x2="1310" y2="1715" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1740" x2="1240" y2="1740" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1765" x2="1300" y2="1765" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1790" x2="1320" y2="1790" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1815" x2="1260" y2="1815" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1850" x2="1310" y2="1850" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1875" x2="1330" y2="1875" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1900" x2="1280" y2="1900" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1925" x2="1320" y2="1925" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1950" x2="1260" y2="1950" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="1975" x2="1300" y2="1975" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="2000" x2="1200" y2="2000" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="2035" x2="1320" y2="2035" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="2060" x2="1290" y2="2060" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="2085" x2="1310" y2="2085" stroke="#D5D5D3" stroke-width="1.5"/>
  <line x1="560" y1="2110" x2="1260" y2="2110" stroke="#D5D5D3" stroke-width="1.5"/>
  <text x="560" y="1632" font-size="14" fill="#555" opacity="0.9">Article continues — classic editorial layout</text>
  <text x="560" y="1632" font-size="14" fill="transparent">.</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="80" y1="2210" x2="1360" y2="2210" stroke="#E8E8E6" stroke-width="0.5"/>

  <!-- ===== CONTINUATION INDICATOR ===== -->
  <text x="720" y="2280" class="serif" font-size="16" fill="#AAA" text-anchor="middle" letter-spacing="1">— Alternating pattern continues —</text>
  <text x="720" y="2310" font-size="12" fill="#CCC" text-anchor="middle">Article text ↔ Image · Image ↔ Article text</text>

  <!-- Down arrow -->
  <line x1="720" y1="2340" x2="720" y2="2380" stroke="#CCC" stroke-width="1"/>
  <polyline points="715,2375 720,2385 725,2375" fill="none" stroke="#CCC" stroke-width="1"/>

  <!-- Repeating pattern hint boxes -->
  <rect x="80" y="2250" width="200" height="120" rx="2" fill="none" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="180" y="2315" font-size="9" fill="#CCC" text-anchor="middle">TEXT</text>

  <rect x="1160" y="2250" width="200" height="120" rx="2" fill="none" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="1260" y="2315" font-size="9" fill="#CCC" text-anchor="middle">IMAGE</text>

  <!-- ===== PAGE LABEL ===== -->
  <text x="720" y="2580" font-size="10" fill="#CCC" text-anchor="middle" letter-spacing="2">SHOOT WITH ARTICLE VIEW</text>
</svg>
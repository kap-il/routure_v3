<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="2400" viewBox="0 0 1440 2400">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
      .serif { font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif; }
    </style>
    <linearGradient id="mainImgGrad" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#2c2c2c"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="nextImgGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="portGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="img4Grad" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="2400" fill="#FAFAF8"/>

  <!-- ===== MAIN IMAGE — Full Width Hero ===== -->
  <rect x="80" y="60" width="1280" height="640" rx="2" fill="url(#mainImgGrad)"/>
  <text x="720" y="370" class="serif" font-size="36" font-weight="700" fill="#FFF" text-anchor="middle" opacity="0.85">Main Image</text>
  <text x="720" y="410" font-size="12" fill="#AAA" text-anchor="middle" letter-spacing="3" opacity="0.6">HERO — FULL BLEED</text>
  <rect x="80" y="60" width="1280" height="640" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>

  <!-- Shoot title + metadata -->
  <text x="80" y="760" class="serif" font-size="11" fill="#999" letter-spacing="3">PHOTO SHOOT</text>
  <text x="80" y="805" class="serif" font-size="40" font-weight="700" fill="#1a1a1a">Landscapes in</text>
  <text x="80" y="855" class="serif" font-size="40" font-weight="700" fill="#1a1a1a">Winter Light</text>
  <line x1="80" y1="880" x2="200" y2="880" stroke="#1a1a1a" stroke-width="1"/>
  <text x="80" y="910" font-size="14" fill="#777">Photographed by Marcus Lehmann</text>
  <text x="80" y="935" font-size="12" fill="#AAA">Spring 2026 · 14 images</text>

  <!-- ===== ROW 1: Portrait + Landscape side by side ===== -->
  <rect x="80" y="990" width="420" height="580" rx="2" fill="url(#portGrad)"/>
  <text x="290" y="1285" class="serif" font-size="20" fill="#CCC" text-anchor="middle" opacity="0.7">Portrait</text>
  <rect x="80" y="990" width="420" height="580" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>

  <rect x="540" y="990" width="820" height="420" rx="2" fill="url(#nextImgGrad)"/>
  <text x="950" y="1210" class="serif" font-size="22" fill="#CCC" text-anchor="middle" opacity="0.7">Next Image</text>
  <rect x="540" y="990" width="820" height="420" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>

  <!-- Image caption -->
  <text x="540" y="1445" font-size="11" fill="#AAA" letter-spacing="1">01 / 14</text>
  <text x="1360" y="1445" font-size="11" fill="#AAA" text-anchor="end" letter-spacing="1">02 / 14</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="80" y1="1490" x2="1360" y2="1490" stroke="#E8E8E6" stroke-width="0.5"/>

  <!-- ===== ROW 2: Full width image ===== -->
  <rect x="80" y="1530" width="1280" height="480" rx="2" fill="url(#img4Grad)"/>
  <text x="720" y="1780" class="serif" font-size="22" fill="#CCC" text-anchor="middle" opacity="0.7">Full Width Image</text>
  <rect x="80" y="1530" width="1280" height="480" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>
  <text x="80" y="2045" font-size="11" fill="#AAA" letter-spacing="1">03 / 14</text>

  <!-- ===== ROW 3: Two equal images ===== -->
  <rect x="80" y="2070" width="620" height="240" rx="2" fill="#3a3a3a"/>
  <text x="390" y="2198" class="serif" font-size="18" fill="#CCC" text-anchor="middle" opacity="0.7">Image</text>
  <rect x="80" y="2070" width="620" height="240" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>

  <rect x="740" y="2070" width="620" height="240" rx="2" fill="#4a4a4a"/>
  <text x="1050" y="2198" class="serif" font-size="18" fill="#CCC" text-anchor="middle" opacity="0.7">Image</text>
  <rect x="740" y="2070" width="620" height="240" rx="2" fill="none" stroke="#DDD" stroke-width="0.5"/>

  <!-- ===== SCROLL / CONTINUATION ===== -->
  <text x="720" y="2360" font-size="11" fill="#AAA" text-anchor="middle" letter-spacing="2">SO ON &amp; SO FORTH</text>
  <line x1="720" y1="2370" x2="720" y2="2390" stroke="#AAA" stroke-width="1"/>
  <polyline points="715,2385 720,2395 725,2385" fill="none" stroke="#AAA" stroke-width="1"/>

  <!-- ===== PAGE LABEL ===== -->
  <text x="1360" y="40" font-size="10" fill="#CCC" text-anchor="end" letter-spacing="2">SHOOT CONCEPT — NO ARTICLE</text>
</svg>
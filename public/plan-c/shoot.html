<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ROUTURE — Event Horizon / Shoot №01</title>
<meta name="viewport" content="width=1440">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>
<script>
window.addEventListener('error', (e) => {
  if (e.message && e.message.includes('ResizeObserver loop')) {
    e.stopImmediatePropagation(); e.preventDefault();
  }
});
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="shoot-page.jsx"></script>

<script type="text/babel">
function ShootPage() {
  const shoot = window.ROUTURE_DATA.shoots[0]; // Event Horizon
  const issue = window.ROUTURE_DATA.issue;
  return (
    <>
      <CustomCursor />
      <AnnoToggle />
      <ShootMasthead shoot={shoot} issue={issue} />
      <ShootHero shoot={shoot} />
      <CreditsBlock shoot={shoot} />
      <ImageSequence shoot={shoot} />
      <ShootOutro shoot={shoot} issue={issue} />
      <footer style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '40px 28px', display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)', gap: 18 }} className="t-mono">
        <span style={{ gridColumn: '1 / 5' }}>© ROUTURE PRESS · ISSUE 02 / COSMIC</span>
        <a style={{ gridColumn: '5 / 9', textAlign: 'center' }} href="index.html" data-cursor="home">← RETURN TO INDEX</a>
        <span style={{ gridColumn: '9 / 13', textAlign: 'right', opacity: 0.6 }}>SHOOT №01 / 08 · EVENT HORIZON</span>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<ShootPage />);
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ROUTURE — Issue No. 02, Cosmic</title>
<meta name="viewport" content="width=1440">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>
<script>
// Suppress benign ResizeObserver loop notification (browser quirk, not a real error)
window.addEventListener('error', (e) => {
  if (e.message && e.message.includes('ResizeObserver loop')) {
    e.stopImmediatePropagation(); e.preventDefault();
  }
});
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hero-title.jsx"></script>
<script type="text/babel" src="home-sections.jsx"></script>
<script type="text/babel" src="home-sections-2.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroTitle": "routure-regular",
  "heroWeight": 200,
  "heroTracking": -5.5,
  "heroAcidAccent": false
}/*EDITMODE-END*/;

function Home() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Broadcast tweaks globally so HeroTitle (in another JSX file / scope) can read them.
  React.useEffect(() => {
    window.__ROUTURE_TWEAKS = t;
    window.dispatchEvent(new Event('__routure_tweaks'));
  }, [t]);

  return (
    <>
      <CustomCursor />
      <AnnoToggle />
      <Masthead />
      <Hero />
      <ShootGallery />
      <PullquoteBand />
      <CategoryArchive />
      <LetterFromBoard />
      <MegaFooter />

      <TweaksPanel title="Tweaks — ROUTURE">
        <TweakSection label="Hero title" />
        <TweakRadio
          label="Treatment"
          value={t.heroTitle}
          options={[
            { value: 'cosmic',          label: 'Cosmic.' },
            { value: 'routure-logo',    label: 'Routure (logo — mixed axes)' },
            { value: 'routure-regular', label: 'Routure (regular — one cut)' },
          ]}
          onChange={(v) => setTweak('heroTitle', v)}
        />
        <TweakSlider
          label="Weight"
          value={t.heroWeight} min={100} max={900} step={50}
          onChange={(v) => setTweak('heroWeight', v)}
        />
        <TweakSlider
          label="Tracking"
          value={t.heroTracking} min={-8} max={0} step={0.5} unit="/100 em"
          onChange={(v) => setTweak('heroTracking', v)}
        />
        <TweakToggle
          label="Acid accent letter"
          value={t.heroAcidAccent}
          onChange={(v) => setTweak('heroAcidAccent', v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<Home />);
</script>
</body>
</html>

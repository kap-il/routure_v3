<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Routure — Issue 02 · Cosmic</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --bg:#FAFAF8;
    --fg:#0A0A0A;
    --ink:#1A1A1A;
    --gray-900:#333333;
    --gray-700:#666666;
    --gray-500:#999999;
    --gray-400:#B5B5B0;
    --gray-300:#CCCCCC;
    --gray-200:#E0E0E0;
    --gray-100:#EAEAEA;
    --paper:#F0EFED;
    --rule:#E5E3DE;
    --serif:"Cormorant Garamond","Cochin","Times New Roman",Georgia,serif;
    --sans:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  html,body{background:var(--bg);color:var(--fg);}
  body{font-family:var(--sans);-webkit-font-smoothing:antialiased;margin:0;font-feature-settings:"kern" 1,"liga" 1;text-rendering:optimizeLegibility;}
  *{box-sizing:border-box;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;}
  h1,h2,h3,h4,h5,h6{font-family:var(--serif);font-weight:600;letter-spacing:-0.01em;margin:0;}
  .serif{font-family:var(--serif);}
  .mono{font-family:var(--mono);}
  ::selection{background:#000;color:#fff;}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--gray-500);}
  .readmore{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);}
  .readmore .arrow{transition:transform .35s cubic-bezier(.2,.7,.2,1);}
  .readmore:hover .arrow{transform:translateX(4px);}
  .hairline{height:1px;background:var(--rule);}
  .hairline-ink{height:1px;background:var(--ink);}
  .tile img{transition:transform 1.1s cubic-bezier(.2,.7,.2,1);}
  .tile:hover img{transform:scale(1.03);}
  .placeholder{background:
    repeating-linear-gradient(135deg,rgba(255,255,255,.04) 0 10px,rgba(255,255,255,0) 10px 22px),
    linear-gradient(140deg,#2b2a28 0%,#191815 60%,#0e0d0b 100%);}
  .editorial-chip{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--gray-200);background:#fff;border-radius:2px;transition:border-color .25s,background .25s;}
  .editorial-chip:hover{border-color:var(--ink);background:#fff;}
  .editorial-chip .ico{font-family:var(--mono);font-size:11px;color:var(--gray-500);}
  .editorial-chip .ttl{font-family:var(--serif);font-size:15px;color:var(--ink);font-weight:500;}
  .editorial-chip .arr{color:var(--gray-300);font-size:11px;}
  .editorial-chip:hover .arr{color:var(--ink);}

  /* Mosaic tile hover */
  .mtile{position:relative;overflow:hidden;border-radius:2px;display:block;cursor:pointer;}
  .mtile .ph{position:absolute;inset:0;}
  .mtile .hover-veil{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .mtile:hover .hover-veil{background:rgba(0,0,0,.45);}
  .mtile .hover-text,.mtile .hover-btn{opacity:0;transform:translateY(6px);transition:opacity .3s,transform .35s cubic-bezier(.2,.7,.2,1);color:#fff;text-align:center;}
  .mtile:hover .hover-text,.mtile:hover .hover-btn{opacity:1;transform:translateY(0);}
  .mtile .hover-text{font-family:var(--serif);font-size:17px;font-style:italic;max-width:72%;line-height:1.45;}
  .mtile .hover-btn{padding:10px 22px;border:1px solid rgba(255,255,255,.85);border-radius:999px;font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;}
  .mtile .zoom{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:999px;background:rgba(0,0,0,.45);display:grid;place-items:center;opacity:0;transition:opacity .3s;color:#fff;font-size:14px;}
  .mtile:hover .zoom{opacity:1;}
  .mtile .shoot-bar{position:absolute;left:0;right:0;bottom:0;background:rgba(17,17,17,.88);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(4px);}
  .mtile .shoot-bar .t{font-family:var(--serif);font-weight:600;font-size:15px;color:#fff;}
  .mtile .shoot-bar .f{font-family:var(--serif);font-weight:400;font-size:14px;color:#A3A3A0;font-style:italic;}
  .mtile .art-dot{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(17,17,17,.78);border-radius:999px;color:#fff;font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;}
  .mtile .num-stamp{position:absolute;top:14px;left:14px;color:rgba(255,255,255,.75);font-family:var(--mono);font-size:10px;letter-spacing:.2em;}

  /* Sticky sidebar scroll progress */
  .dotcol{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .dotcol .dot{width:6px;height:6px;border-radius:50%;background:var(--gray-200);transition:background .3s,transform .3s;}
  .dotcol .dot.on{background:var(--ink);transform:scale(1.35);}

  /* Back link */
  .back{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gray-500);transition:color .25s,transform .25s;}
  .back:hover{color:var(--ink);}
  .back .arr{transition:transform .3s;}
  .back:hover .arr{transform:translateX(-4px);}

  /* Floating TOC button */
  .toc-fab{position:fixed;right:24px;bottom:24px;z-index:30;background:var(--ink);color:#fff;border:none;border-radius:999px;padding:14px 22px;font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);transition:transform .25s;}
  .toc-fab:hover{transform:translateY(-2px);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="issue-v1.jsx"></script>
</body>
</html>
